# @package _global_

###
# Set the experiment parts you would like to import
####
defaults:
  - override /model@scfm.model: transformer  # the chosen model
  - override /dataset@scfm.dataset: ms  # dataset for the relevant task
  - override /tasks@scfm.tasks: cell_type_annotation  # dataset for the relevant task
  - override /scheduler@scfm.scheduler: cosine  # contains scheduler
  - override /trainer@scfm.trainer: default  # contains optimizer and trainer details
  - override /optimizer@scfm.optimizer: AdamW
  - override /fc@scfm.fc: geneformer
  - override /fg@scfm.fg: identity
  - override /loss@scfm.loss: CrossEntropyLoss

####
# Set the specific parameters you would like to change from the defaults
####
project_name: cta_ms  # project name for WandB
run_name: ${scfm.model.type}_lr${scfm.optimizer.args.lr}_bz${scfm.tasks.args.batchsize}  # what is set for WandB
work_dir: work_dir  # set your custom working directory
seed: 55

optimizer:
  args:
    lr: 2e-3
