# @package _global_

###
# Set the experiment parts you would like to import
####
defaults:
  - override /model@scfm.model: expression_only  # the chosen model
  - override /dataset@scfm.dataset: scdrs_tissue  # dataset for the relevant task
  - override /tasks@scfm.tasks: polygenic_disease_risk_baseline  # dataset for the relevant task
  - override /scheduler@scfm.scheduler: cosine  # contains scheduler
  - override /trainer@scfm.trainer: default  # contains optimizer and trainer details
  - override /optimizer@scfm.optimizer: AdamW
  - override /fc@scfm.fc: dummy
  - override /fe@scfm.fe: dummy
  - override /fg@scfm.fg: dummy
  - override /loss@scfm.loss: MaskedBCEWithLogitsLoss

####
# Set the specific parameters you would like to change from the defaults
####
project_name: polygenic_disease_risk_tissue  # project name for WandB
run_name: ${scfm.fg.type}_${scfm.fe.type}_${scfm.fc.type}_${scfm.model.type}_lr${scfm.optimizer.args.lr}_bz${scfm.tasks.args.batchsize}  ## what is set for WandB
work_dir: work_dir  # set your custom working directory
seed: 55

trainer:
  accumulate_grad_batches: 1

optimizer:
  learning_rate: 2e-3
