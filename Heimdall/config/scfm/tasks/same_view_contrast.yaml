type: Heimdall.task.ContrastiveViewTask

args:
  task_type: regression
  metrics: []
  train_split: 0.95
  shuffle: true
  min_panel_size: 2
  batchsize: ${scfm.trainer.args.batchsize}
  head_config:
    type: Heimdall.models.SameViewContrastiveDecoder
  loss_config:
    type: Heimdall.losses.ContrastiveMulticlassLoss
