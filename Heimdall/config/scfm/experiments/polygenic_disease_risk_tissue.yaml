# @package _global_
defaults:
  - /scfm/tasks@scfm.tasks.default: polygenic_disease_risk
  - override /scfm/model@scfm.model: transformer
  - override /scfm/dataset@scfm.dataset: scdrs
  - override /scfm/scheduler@scfm.scheduler: cosine
  - override /scfm/trainer@scfm.trainer: default
  - override /scfm/optimizer@scfm.optimizer: AdamW
  - override /scfm/fc@scfm.fc: geneformer
  - override /scfm/fg@scfm.fg: identity

project_name: polygenic_disease_risk_tissue
run_name: ${scfm.fg.type}_${scfm.fe.type}_${scfm.fc.type}_${scfm.model.type}_lr${scfm.optimizer.args.lr}_bz${scfm.tasks.default.args.batchsize}

scfm:
  optimizer:
    learning_rate: 2e-3
  trainer:
    accumulate_grad_batches: 1

seed: 55
work_dir: work_dir
