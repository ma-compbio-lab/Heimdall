# @package _global_

###
# Set the experiment parts you would like to import
####
defaults:
  - override /model@scfm_config.model: transformer_3M  # the chosen model
  - override /dataset@scfm_config.dataset: scTab_100K_tissuesplit_30celltypes  # dataset for the relevant task
  - override /tasks@scfm_config.tasks: sctab_tissue  # dataset for the relevant task
  - override /scheduler@scfm_config.scheduler: cosine  # contains scheduler
  - override /trainer@scfm_config.trainer: default  # contains optimizer and trainer details
  - override /optimizer@scfm_config.optimizer: AdamW
  - override /fc@scfm_config.fc: geneformer
  - override /fg@scfm_config.fg: identity
  - override /loss@scfm_config.loss: CrossEntropyLoss

####
# Set the specific parameters you would like to change from the defaults
####
project_name: sctab_bloodbrain_100K  # project name for WandB
run_name: ${scfm_config.fg.type}_${scfm_config.fe.type}_${scfm_config.fc.type}_${scfm_config.model.type}_lr${scfm_config.optimizer.args.lr}_bz${scfm_config.tasks.args.batchsize}  ## what is set for WandB
work_dir: work_dir  ## set your custom working directory
seed: 55

optimizer:
  args:
    lr: 2e-3
