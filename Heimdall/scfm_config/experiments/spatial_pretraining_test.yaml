# @package _global_
defaults:
  - /scfm_config/tasks@scfm_config.tasks.default: pretrain_geneformer_dev
  - override /scfm_config/model@scfm_config.model: transformer_flash
  - override /scfm_config/dataset@scfm_config.dataset: spatial_pretraining_test
  - override /scfm_config/scheduler@scfm_config.scheduler: cosine
  - override /scfm_config/optimizer@scfm_config.optimizer: AdamW
  - override /scfm_config/fc@scfm_config.fc: geneformer
  - override /scfm_config/fe@scfm_config.fe: zero
  - override /scfm_config/fg@scfm_config.fg: pca_esm2

project_name: spatial_pretraining_test
run_name: ${scfm_config.fg.type}_${scfm_config.fe.type}_${scfm_config.fc.type}_${scfm_config.model.type}_lr${scfm_config.optimizer.args.lr}_bz${scfm_config.tasks.default.args.batchsize}

scfm_config:
  optimizer:
    args:
      lr: 2e-3

seed: 55
work_dir: spatial_pretraining_test
