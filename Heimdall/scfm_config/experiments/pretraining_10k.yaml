# @package _global_
defaults:
  - /scfm_config/tasks@scfm_config.tasks.default: pretrain_geneformer_dev
  - override /scfm_config/model@scfm_config.model: transformer
  - override /scfm_config/dataset@scfm_config.dataset: pretrain_10k
  - override /scfm_config/scheduler@scfm_config.scheduler: cosine
  - override /scfm_config/optimizer@scfm_config.optimizer: AdamW
  - override /scfm_config/fc@scfm_config.fc: scbert_randsort
  - override /scfm_config/fe@scfm_config.fe: binning_scbert
  - override /scfm_config/fg@scfm_config.fg: esm2

project_name: pretraining
run_name: ${scfm_config.fg.type}_${scfm_config.fe.type}_${scfm_config.fc.type}_${scfm_config.model.type}_lr${scfm_config.optimizer.args.lr}_bz${scfm_config.tasks.default.args.batchsize}

scfm_config:
  optimizer:
    args:
      lr: 2e-3

seed: 55
work_dir: ${project_name}_results/${scfm_config.fg.type}_${scfm_config.fe.name}_${scfm_config.fc.type}_${scfm_config.dataset.dataset_name}_lr${scfm_config.optimizer.args.lr}_bz${scfm_config.tasks.default.args.batchsize}_seed${seed}_ag${scfm_config.fe.args.drop_zeros}
