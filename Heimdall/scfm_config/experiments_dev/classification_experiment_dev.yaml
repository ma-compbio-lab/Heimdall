# @package _global_
defaults:
  - /scfm_config/tasks@scfm_config.tasks.default: cell_type_annotation
  - override /scfm_config/model@scfm_config.model: transformer
  - override /scfm_config/dataset@scfm_config.dataset: pancreas
  - override /scfm_config/scheduler@scfm_config.scheduler: cosine
  - override /scfm_config/trainer@scfm_config.trainer: default
  - override /scfm_config/optimizer@scfm_config.optimizer: AdamW
  - override /scfm_config/fc@scfm_config.fc: geneformer
  - override /scfm_config/fe@scfm_config.fe: sorting
  - override /scfm_config/fg@scfm_config.fg: identity
  - override /scfm_config/loss@scfm_config.loss: CrossEntropyLoss

project_name: cell_type_classification_dev
run_name: test01

scfm_config:
  optimizer:
    args:
      lr: 2e-3
  tasks:
    default:
      args:
        epochs: 1
  trainer:
    accumulate_grad_batches: 1

seed: 55
work_dir: work_dir
